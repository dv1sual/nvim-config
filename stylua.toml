# stylua.toml - StyLua configuration file
# Place this in your Neovim config root directory (~/.config/nvim/ on Linux/Mac or ~/AppData/Local/nvim/ on Windows)

column_width = 100
line_endings = "Unix"
indent_type = "Spaces"
indent_width = 2
quote_style = "AutoPreferDouble"
call_parentheses = "Always"

[sort_requires]
enabled = false
